<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA redirect - preserves clean URLs
    (function() {
      var path = window.location.pathname.replace(/\/$/, '') || '/';
      var hash = window.location.hash || '';
      // Vue Router hash mode: redirect /games → /index.html#/games
      var cleanPath = path.replace(/^\//, '').replace(/^index\.html$/, '');
      var target = '/index.html';
      if (cleanPath) {
        target += '#/' + cleanPath;
      }
      // If original URL had a hash (e.g. /games#section), preserve it
      if (hash && hash !== '#/') {
        target += hash.replace(/^#/, '');
      }
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
